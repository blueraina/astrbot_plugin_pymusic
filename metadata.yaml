name: astrbot_plugin_pymusic
desc: Generate structured pure Python WAV electronic music from prompts with musicpy-assisted composition and send it to QQ chats.
help: Use /pymusic <seconds> <music prompt> to generate a musicpy-assisted electronic, 8bit, ambient, lofi, techno, synthwave, trance, house, or breakbeat WAV clip.
version: v0.4.7
author: Lenovo
repo: "https://github.com/blueraina/astrbot_plugin_pymusic"
support_platforms:
  - aiocqhttp
  - qq_official
  - qq_official_webhook
